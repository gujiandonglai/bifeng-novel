  <h1>关于笔锋</h1>
  <p>笔锋（Bifeng Novel）是一个完全免费、部署于 GitHub Pages 的个人小说网站，不依赖服务器与数据库，以纯静态的方式长期维护与扩展。这里收录的作品涵盖玄幻、武侠、科幻等多种类型，希望能让每一个故事都被认真对待、认真阅读。</p>

  <h2>关于作者</h2>
  <p>王东来，独立创作者，长期从事小说创作与内容创作。笔锋是他用来沉淀长篇故事的地方。</p>
